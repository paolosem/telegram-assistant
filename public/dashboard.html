<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regia OS Dashboard</title>
    <style>
      :root {
        --bg: #f4efe5;
        --card: #fffaf2;
        --text: #1f1a17;
        --muted: #6b625b;
        --accent: #bf5f2a;
        --accent-2: #136f63;
        --line: #e4d8c8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 0%, #fff6eb 0%, var(--bg) 45%);
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
        position: relative;
      }
      h1 { margin: 0 0 12px; }
      .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 16px;
      }
      input, select, button {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
      }
      button {
        background: var(--accent);
        color: #fff;
        cursor: pointer;
      }
      button.secondary { background: var(--accent-2); }
      button.danger { background: #a33a2a; }
      button.ghost { background: transparent; color: var(--text); }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .quick {
        display: inline-flex;
        gap: 6px;
      }
      .quick button {
        background: #fff;
        color: var(--text);
      }
      .toolbar .spacer { flex: 1; }
      .right-menu {
        position: fixed;
        right: 18px;
        top: 100px;
        width: 170px;
        background: #fff8ed;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 40;
      }
      .right-menu button {
        text-decoration: none;
        width: 100%;
        text-align: left;
        background: #fff;
        color: var(--text);
      }
      .right-menu a {
        display: block;
        width: 100%;
        text-align: left;
        background: #fff;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 14px;
        text-decoration: none;
      }
      .right-menu a.active {
        border-color: var(--accent);
        color: var(--accent);
        font-weight: 600;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 12px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 14px;
      }
      .card h2 {
        margin: 0 0 10px;
        font-size: 16px;
      }
      .kpi { grid-column: span 3; }
      .list { grid-column: span 6; }
      .full { grid-column: span 12; }
      .item {
        border-bottom: 1px dashed var(--line);
        padding: 8px 0;
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }
      .item:last-child { border-bottom: none; }
      .muted { color: var(--muted); font-size: 13px; }
      .agenda-list .item {
        align-items: center;
      }
      .agenda-time {
        min-width: 64px;
        font-weight: 600;
        color: var(--accent-2);
      }
      .agenda-title {
        font-weight: 600;
      }
      .agenda-meta {
        color: var(--muted);
        font-size: 12px;
      }
      .category-select {
        min-width: 140px;
      }
      .notes-area {
        width: 100%;
        min-height: 220px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        font-size: 14px;
        line-height: 1.45;
        background: #fff;
      }
      .notes-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
      }
      .toast {
        position: fixed;
        right: 16px;
        bottom: 16px;
        background: #1e342f;
        color: #fff;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid #2a4a43;
        display: none;
        z-index: 999;
      }
      .toast.show { display: block; }
      @media (max-width: 900px) {
        .kpi, .list, .full { grid-column: span 12; }
        .right-menu { position: static; width: 100%; margin: 10px 0; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Regia OS Dashboard</h1>
      <div class="muted">Task, calendario e decisioni in un unico posto.</div>

      <aside class="right-menu">
        <a id="nav-overview" href="/dashboard/overview">Panoramica</a>
        <a id="nav-agenda" href="/dashboard/agenda">Agenda</a>
        <a id="nav-tasks" href="/dashboard/tasks">Task</a>
        <a id="nav-notes" href="/dashboard/notes">Appunti</a>
        <a id="nav-focus" href="/dashboard/focus">Focus</a>
      </aside>

      <div class="toolbar">
        <input id="dateInput" type="date" />
        <div class="quick">
          <button class="ghost" id="btnIeri">Ieri</button>
          <button class="ghost" id="btnOggi">Oggi</button>
          <button class="ghost" id="btnDomani">Domani</button>
        </div>
        <button id="refreshBtn">Aggiorna</button>
        <span class="spacer"></span>
        <input id="taskTitle" placeholder="Nuova task" style="min-width:220px" />
        <select id="taskPriority">
          <option value="media">media</option>
          <option value="alta">alta</option>
          <option value="bassa">bassa</option>
        </select>
        <input id="taskDue" placeholder="scadenza (opzionale)" />
        <button id="addTaskBtn" class="secondary">Aggiungi task</button>
      </div>

      <div id="section-overview" class="grid">
        <div class="card kpi"><h2>Task aperte</h2><div id="kpiOpen">-</div></div>
        <div class="card kpi"><h2>Task oggi</h2><div id="kpiToday">-</div></div>
        <div class="card kpi"><h2>Eventi giorno</h2><div id="kpiEvents">-</div></div>
        <div class="card kpi"><h2>Task in backlog</h2><div id="kpiBacklog">-</div></div>

        <div id="section-agenda" class="card full">
          <h2>Agenda</h2>
          <div id="events" class="agenda-list"></div>
        </div>

        <div id="section-tasks" class="card list">
          <h2>Top Task</h2>
          <div id="tasks"></div>
        </div>

        <div id="section-notes" class="card list">
          <div class="notes-head">
            <h2 style="margin:0;">Appunti</h2>
            <button id="saveNotesBtn" class="secondary">Salva appunti</button>
          </div>
          <textarea id="notesArea" class="notes-area" placeholder="Scrivi qui qualsiasi cosa..."></textarea>
          <div id="notesStatus" class="muted" style="margin-top:8px;">Nessuna modifica.</div>
        </div>

        <div id="section-focus" class="card full">
          <h2>Focus operativo</h2>
          <div id="focusSummary" class="muted">Nessun dato.</div>
        </div>
      </div>
    </div>
    <div id="toast" class="toast"></div>

    <script>
      const state = { uid: null, date: "" };
      let toastTimer = null;
      let notesTimer = null;
      const EVENT_CATEGORIES = ["", "Lavoro", "Commerciale", "Operativo", "Personale", "Admin", "Studio", "Follow-up"];

      function toInputDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }

      function setBusy(value) {
        document.querySelectorAll("button").forEach((btn) => {
          btn.disabled = Boolean(value);
        });
      }

      function showToast(message) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.classList.add("show");
        if (toastTimer) clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("show"), 2200);
      }

      function currentPage() {
        const parts = window.location.pathname.split("/").filter(Boolean);
        const value = parts[1] || "overview";
        return ["overview", "agenda", "tasks", "notes", "focus"].includes(value)
          ? value
          : "overview";
      }

      function applyPageLayout() {
        const page = currentPage();
        const allSections = ["overview", "agenda", "tasks", "notes", "focus"];
        allSections.forEach((id) => {
          const el = document.getElementById(`section-${id}`);
          if (!el) return;
          el.style.display = id === page ? "" : "none";
          const nav = document.getElementById(`nav-${id}`);
          if (nav) nav.classList.toggle("active", id === page);
        });
      }

      function timeLabel(event) {
        if (event.startDate) return "Tutto il giorno";
        if (!event.startDateTime) return "-";
        const d = new Date(event.startDateTime);
        return d.toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" });
      }

      async function fetchOverview() {
        setBusy(true);
        const dateValue = document.getElementById("dateInput").value || toInputDate(new Date());
        state.date = dateValue;
        const query = new URLSearchParams();
        query.set("date", dateValue);
        if (state.uid) query.set("uid", state.uid);
        try {
          const res = await fetch(`/api/overview?${query.toString()}`);
          if (!res.ok) throw new Error("Errore lettura overview");
          const data = await res.json();
          state.uid = data.userId;
          render(data);
        } finally {
          setBusy(false);
        }
      }

      function render(data) {
        const tasksOpen = Array.isArray(data.tasksOpen) ? data.tasksOpen : [];
        const tasksToday = Array.isArray(data.tasksToday) ? data.tasksToday : [];
        const events = Array.isArray(data.events) ? data.events : [];

        document.getElementById("kpiOpen").textContent = tasksOpen.length;
        document.getElementById("kpiToday").textContent = tasksToday.length;
        document.getElementById("kpiEvents").textContent = events.length;
        document.getElementById("kpiBacklog").textContent = tasksOpen.filter((t) => !t.dueDate).length;

        const sortedEvents = [...events].sort((a, b) => {
          const aTime = a.startDateTime || `${a.startDate || ""}T00:00:00`;
          const bTime = b.startDateTime || `${b.startDate || ""}T00:00:00`;
          return new Date(aTime) - new Date(bTime);
        });

        document.getElementById("events").innerHTML = sortedEvents.length
          ? sortedEvents.map((e) => {
            const options = EVENT_CATEGORIES
              .map((category) => `<option value="${category}" ${e.category === category ? "selected" : ""}>${category || "Senza categoria"}</option>`)
              .join("");
            return `
            <div class="item">
              <div class="agenda-time">${timeLabel(e)}</div>
              <div style="flex:1;">
                <div class="agenda-title">${e.summary}</div>
                <div class="agenda-meta">${e.calendarSummary || ""}</div>
              </div>
              <select class="category-select" data-eventkey="${e.eventKey || ""}">
                ${options}
              </select>
            </div>`;
          }).join("")
          : `<div class="muted">Nessun evento</div>`;

        const topTasks = tasksOpen.slice(0, 10);
        document.getElementById("tasks").innerHTML = topTasks.length
          ? topTasks.map((t) => `
            <div class="item">
              <div>
                <div><strong>[${t.id}] ${t.title}</strong></div>
                <div class="muted">priorita: ${t.priority}${t.dueDate ? ` | scadenza: ${t.dueDate}` : ""}</div>
              </div>
              <div style="display:flex; gap:6px;">
                <button onclick="markDone(${t.id})">Done</button>
                <button class="danger" onclick="deleteTask(${t.id})">Elimina</button>
              </div>
            </div>`).join("")
          : `<div class="muted">Nessuna task aperta</div>`;

        const nextTask = topTasks[0];
        const nextEvent = sortedEvents[0];
        const focus = [
          nextTask ? `Prossima task: ${nextTask.title}` : "Nessuna task prioritaria in coda.",
          nextEvent ? `Primo evento: ${nextEvent.summary}` : "Nessun evento nel giorno selezionato."
        ];
        document.getElementById("focusSummary").textContent = focus.join(" | ");

        const notesArea = document.getElementById("notesArea");
        if (document.activeElement !== notesArea) {
          notesArea.value = data.notes || "";
        }

        attachCategoryHandlers();
      }

      function attachCategoryHandlers() {
        document.querySelectorAll(".category-select").forEach((select) => {
          select.onchange = async () => {
            const eventKey = select.dataset.eventkey;
            const category = select.value;
            await saveEventCategory(eventKey, category);
          };
        });
      }

      async function markDone(id) {
        setBusy(true);
        const query = new URLSearchParams({ id: String(id), uid: state.uid });
        const res = await fetch(`/api/task/done?${query.toString()}`, { method: "POST" });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          alert(data.error || "Errore completamento task");
          setBusy(false);
          return;
        }
        await fetchOverview();
        showToast("Task completata");
      }

      async function deleteTask(id) {
        if (!confirm("Eliminare questa task?")) return;
        setBusy(true);
        const query = new URLSearchParams({ id: String(id), uid: state.uid });
        const res = await fetch(`/api/task/delete?${query.toString()}`, { method: "POST" });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          alert(data.error || "Errore eliminazione task");
          setBusy(false);
          return;
        }
        await fetchOverview();
        showToast("Task eliminata");
      }

      async function saveEventCategory(eventKey, category) {
        if (!eventKey) return;
        const query = new URLSearchParams();
        if (state.uid) query.set("uid", state.uid);
        const res = await fetch(`/api/event/category?${query.toString()}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ eventKey, category })
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          alert(data.error || "Errore salvataggio categoria");
          return;
        }
        showToast("Categoria evento aggiornata");
      }

      async function saveNotes(manual = false) {
        const notes = document.getElementById("notesArea").value;
        const notesStatus = document.getElementById("notesStatus");
        const query = new URLSearchParams();
        if (state.uid) query.set("uid", state.uid);
        const res = await fetch(`/api/notes/save?${query.toString()}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ notes })
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          notesStatus.textContent = data.error || "Errore salvataggio appunti. Riavvia il bot e riprova.";
          if (manual) alert(notesStatus.textContent);
          return;
        }
        notesStatus.textContent = `Salvato alle ${new Date().toLocaleTimeString("it-IT", { hour: "2-digit", minute: "2-digit" })}`;
        if (manual) showToast("Appunti salvati");
      }

      async function addTask() {
        setBusy(true);
        const title = document.getElementById("taskTitle").value.trim();
        const priority = document.getElementById("taskPriority").value;
        const dueDate = document.getElementById("taskDue").value.trim();
        if (!title) {
          setBusy(false);
          return;
        }
        const query = new URLSearchParams();
        if (state.uid) query.set("uid", state.uid);
        const res = await fetch(`/api/task/add?${query.toString()}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, priority, dueDate })
        });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          alert(data.error || "Errore creazione task");
          setBusy(false);
          return;
        }
        document.getElementById("taskTitle").value = "";
        await fetchOverview();
        showToast("Task aggiunta");
      }

      applyPageLayout();

      document.getElementById("refreshBtn").addEventListener("click", fetchOverview);
      document.getElementById("addTaskBtn").addEventListener("click", addTask);
      document.getElementById("saveNotesBtn").addEventListener("click", () => saveNotes(true));
      document.getElementById("notesArea").addEventListener("input", () => {
        const notesStatus = document.getElementById("notesStatus");
        notesStatus.textContent = "Modifiche in corso...";
        if (notesTimer) clearTimeout(notesTimer);
        notesTimer = setTimeout(() => saveNotes(false), 900);
      });
      document.getElementById("taskTitle").addEventListener("keydown", (event) => {
        if (event.key === "Enter") addTask();
      });
      document.getElementById("btnIeri").addEventListener("click", () => {
        const d = new Date();
        d.setDate(d.getDate() - 1);
        document.getElementById("dateInput").value = toInputDate(d);
        fetchOverview();
      });
      document.getElementById("btnOggi").addEventListener("click", () => {
        document.getElementById("dateInput").value = toInputDate(new Date());
        fetchOverview();
      });
      document.getElementById("btnDomani").addEventListener("click", () => {
        const d = new Date();
        d.setDate(d.getDate() + 1);
        document.getElementById("dateInput").value = toInputDate(d);
        fetchOverview();
      });
      document.getElementById("dateInput").value = toInputDate(new Date());
      fetchOverview();
    </script>
  </body>
</html>
